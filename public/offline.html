<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | Lab Shared Hub</title>
  <meta name="theme-color" content="#b65d2d">
  <style>
    :root {
      color-scheme: light;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f7f0e6 0%, #eadfce 100%);
      color: #19242b;
      font-family: "Yu Gothic UI", "Hiragino Sans", "BIZ UDPGothic", sans-serif;
      padding: 24px;
      box-sizing: border-box;
    }

    main {
      width: min(560px, 100%);
      padding: 28px;
      border-radius: 24px;
      background: rgba(255, 250, 245, 0.92);
      border: 1px solid rgba(25, 36, 43, 0.1);
      box-shadow: 0 24px 60px rgba(37, 42, 46, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 2.8rem);
      line-height: 1.1;
    }

    p {
      margin: 0;
      line-height: 1.8;
      color: #59686f;
    }
  </style>
</head>
<body>
  <main>
    <h1>You are offline</h1>
    <p>The connection is currently unavailable. Once the network comes back, the shared lab entry point can be loaded again.</p>
  </main>
</body>
</html>
