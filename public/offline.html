<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オフライン | 人間工学研究室</title>
  <meta name="theme-color" content="#191970">
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top center, rgba(255, 255, 255, 0.08), transparent 22%),
        linear-gradient(180deg, #191970 0%, #0a1028 100%);
      color: #f4f7ff;
      font-family: "Yu Gothic UI", "Hiragino Sans", "BIZ UDPGothic", sans-serif;
    }

    main {
      width: min(560px, 100%);
      padding: 32px;
      border-radius: 28px;
      background: rgba(14, 20, 45, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 5vw, 2.8rem);
      line-height: 1.08;
    }

    p {
      margin: 0;
      color: #c2cbe7;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <main>
    <h1>オフラインです</h1>
    <p>現在ネットワークに接続できません。接続が戻ると、人間工学研究室の共有ページを再び開けます。</p>
  </main>
</body>
</html>
